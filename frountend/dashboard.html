<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>📚 LibraByte</h2>

    <ul>
      <li class="active"><i class="fas fa-home"></i> Dashboard</li>
      <li><i class="fas fa-book"></i> Books</li>
      <li><i class="fas fa-exchange-alt"></i> Issue/Return</li>
      <li><i class="fas fa-users"></i> Users</li>
      <li onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</li>
    </ul>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- HERO -->
    <div class="hero">
      <div>
        <h1>Welcome Back 👋</h1>
        <p>Your smart library management system</p>
      </div>
      <img src="images/books.png">
    </div>

    <!-- STATS -->
    <div class="cards">

      <div class="card gradient1">
        <i class="fas fa-book"></i>
        <h2>120</h2>
        <p>Total Books</p>
      </div>

      <div class="card gradient2">
        <i class="fas fa-book-reader"></i>
        <h2>45</h2>
        <p>Issued</p>
      </div>

      <div class="card gradient3">
        <i class="fas fa-check-circle"></i>
        <h2>75</h2>
        <p>Available</p>
      </div>

    </div>

  </div>

</div>

<script>
function logout(){
  window.location.href="index.html";
}
</script>

</body>
</html>
