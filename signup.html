<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>
  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="container">

  <div class="header">
    <h2><span class="light">Libra</span>Byte</h2>

    <div>
      <span>Already have an account?</span>
      <button class="signup" onclick="goToLogin()">Login</button>
    </div>
  </div>

  <div class="main">

    <!-- LEFT -->
    <div class="left">
      <h1>Create Account</h1>

      <label>Name</label>
      <input id="name" type="text" placeholder="Enter your name">

      <label>Email</label>
      <input id="emailSignup" type="text" placeholder="Enter email">

      <label>Password</label>
      <input id="passwordSignup" type="password" placeholder="Enter password">

      <button class="login-btn" onclick="signup()">Sign Up</button>

      <p class="forgot">Join LibraByte Library System</p>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <img src="images/books.png">
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
